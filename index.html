  <footer>
    <span>gmail: breannaellamichel@gmail.com</span>
    <a href="contact.html" class="contact-btn">Contact</a>
  </footer>

  <!-- FULLSCREEN VIEWER -->
  <div id="viewer" onclick="closeViewer(event)">
    <button id="viewer-close">&times;</button>
    <img id="viewer-img">
  </div>

  <script>
    function openViewer(src) {
      const viewer = document.getElementById("viewer");
      const img = document.getElementById("viewer-img");
      img.src = src;
      viewer.classList.add("show");
      document.body.classList.add("viewer-open");
    }

    function closeViewer(e) {
      if (e.target.id === "viewer" || e.target.id === "viewer-close") {
        document.getElementById("viewer").classList.remove("show");
        document.body.classList.remove("viewer-open");
      }
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        document.getElementById("viewer").classList.remove("show");
        document.body.classList.remove("viewer-open");
      }
    });
  </script>

</body>
